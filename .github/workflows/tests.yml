name: tests

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m playwright install --with-deps chromium
      - run: ruff check src tests websitebench
      - run: python -m pytest tests/web2code tests/viewer -q
