x-security: &service-security
  read_only: true
  cap_drop: [ALL]
  security_opt: [no-new-privileges:true]
  init: true
  restart: "no"

x-websitebench:
  roles: {reference: target, mailbox_query: inbox, mailbox_delivery: delivery, build_daemon: buildd, candidate_builder: builder, browser_gateway: browser, model_proxy: model, agent: worker, evaluator: judge}
  networks: {agent_control: agent-control, reference_web: reference-web, candidate_web: candidate-web, model_egress: model-egress, build_egress: build-egress, internet_egress: internet-egress}
  public_fixtures: []

services:
  target:
    <<: *service-security
    profiles: [corpus, build, judge]
    build:
      context: ../..
      dockerfile: websitebench/commerce-runtime/reference/Dockerfile
    environment:
      PORT: "8080"
      BENCH_ADMIN_PORT: "8081"
      BENCH_ADMIN_TOKEN: ${BENCH_ADMIN_TOKEN:?required}
      DATA_DIR: /data
      BENCH_FIXTURE_DIR: /bench-fixtures
      INITIAL_FIXTURE: /bench-public-fixtures/${PUBLIC_SEED:?required}.json
      VARIANT_SPEC: /task/variant.yaml
      MAILBOX_API_URL: http://delivery:8027
      MAILBOX_DELIVERY_TOKEN: ${MAILBOX_DELIVERY_TOKEN:?required}
      PUBLIC_SITE_URL: http://target:8080
    volumes:
      - reference-data:/data
      - ${REFERENCE_SOURCE_DIR:?required}:/opt/reference:ro
      - ${RUN_DIR:?required}/public/fixtures:/bench-public-fixtures:ro
      - ${PRIVATE_FIXTURE_DIR:?required}:/bench-fixtures:ro
      - ${VARIANT_SPEC_PATH:?required}:/task/variant.yaml:ro
    tmpfs: ["/tmp:rw,noexec,nosuid,size=128m"]
    networks: {reference-web: {}}
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 24

  inbox:
    <<: *service-security
    profiles: [corpus, build, judge]
    build:
      context: ../..
      dockerfile: websitebench/services/mailbox/Dockerfile
    environment:
      MAILBOX_PORT: "8025"
      MAILBOX_ADMIN_PORT: "8026"
      MAILBOX_DATA_DIR: /data
      MAILBOX_DELIVERY_TOKEN: ${MAILBOX_DELIVERY_TOKEN:?required}
      BENCH_ADMIN_TOKEN: ${BENCH_ADMIN_TOKEN:?required}
    volumes: [mailbox-data:/data]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=64m"]
    networks: {reference-web: {}}

  delivery:
    <<: *service-security
    profiles: [corpus, build, judge]
    build:
      context: ../..
      dockerfile: websitebench/services/mailbox/Dockerfile
    command: [python, -m, benchmail.run_delivery]
    environment:
      MAILBOX_DELIVERY_PORT: "8027"
      MAILBOX_DATA_DIR: /data
      MAILBOX_DELIVERY_TOKEN: ${MAILBOX_DELIVERY_TOKEN:?required}
    volumes: [mailbox-data:/data]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=64m"]
    networks: {reference-web: {}, candidate-web: {}}

  buildd:
    image: docker:28.0.4-dind-rootless
    profiles: [build]
    user: "1000:1000"
    environment: {DOCKER_TLS_CERTDIR: "", DOCKER_HOST: "tcp://0.0.0.0:2375"}
    command: [dockerd, "--host=tcp://0.0.0.0:2375", "--host=unix:///run/user/1000/docker.sock", "--storage-driver=vfs", "--log-level=warn"]
    security_opt: [seccomp=unconfined, apparmor=unconfined]
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID]
    volumes:
      - build-data:/home/rootless/.local/share/docker
      - ${RUN_DIR:?required}/public/fixtures:/bench-public-fixtures:ro
      - ../schemas:/bench-schemas:ro
    tmpfs: ["/tmp:rw,nosuid,size=512m", "/run:rw,nosuid,size=64m"]
    networks: {build-egress: {}, candidate-web: {}}
    healthcheck:
      test: [CMD, docker, --host, "tcp://127.0.0.1:2375", info]
      interval: 5s
      timeout: 4s
      retries: 36

  builder:
    <<: *service-security
    profiles: [build]
    build:
      context: ../..
      dockerfile: websitebench/services/builder/Dockerfile
    depends_on: {buildd: {condition: service_healthy}}
    environment:
      BUILDER_TOKEN: ${BUILDER_TOKEN:?required}
      BENCH_ADMIN_TOKEN: ${BENCH_ADMIN_TOKEN:?required}
      MAILBOX_DELIVERY_TOKEN: ${MAILBOX_DELIVERY_TOKEN:?required}
      CANDIDATE_WORKSPACE: /workspace/candidate
      BUILDER_ARTIFACT_DIR: /artifacts/builds
      CANDIDATE_BUILD_BUDGET: ${CANDIDATE_BUILD_BUDGET:-10}
      DOCKER_HOST: tcp://buildd:2375
      PREVIEW_FIXTURE_MOUNT: /bench-public-fixtures
      PREVIEW_FIXTURE_SOURCE: /task/public/fixtures/${PUBLIC_SEED:?required}.json
      PREVIEW_SCHEMA_MOUNT: /bench-schemas
      MAILBOX_API_URL: http://delivery:8027
      PUBLIC_MAILBOX_URL: http://inbox:8025
      PUBLIC_SITE_URL: http://buildd:18080
      RUN_ID: ${RUN_ID:?required}
    volumes:
      - ${RUN_DIR:?required}/candidate:/workspace/candidate
      - ${RUN_DIR:?required}/builds:/artifacts/builds
      - ${RUN_DIR:?required}/public:/task/public:ro
    tmpfs: ["/tmp:rw,noexec,nosuid,size=128m"]
    networks: {agent-control: {}, build-egress: {}}
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7100/healthz', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 24

  model:
    <<: *service-security
    profiles: [build]
    build:
      context: ../..
      dockerfile: websitebench/services/model-proxy/Dockerfile
    environment:
      MODEL_API_HOST: ${MODEL_API_HOST:?required}
      MODEL_API_PORT: ${MODEL_API_PORT:?required}
      MODEL_PROXY_PORT: "7200"
    tmpfs: ["/tmp:rw,noexec,nosuid,size=32m"]
    networks: {model-egress: {}, internet-egress: {}}

  browser:
    <<: *service-security
    profiles: [build]
    build:
      context: ../..
      dockerfile: websitebench/services/browser-gateway/Dockerfile
    depends_on: {target: {condition: service_healthy}, inbox: {condition: service_started}}
    environment:
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:?required}
      REFERENCE_URL: http://target:8080
      PUBLIC_MAILBOX_URL: http://inbox:8025
      CANDIDATE_URL: http://buildd:18080
      BROWSER_ACTION_BUDGET: ${BROWSER_ACTION_BUDGET:-400}
      GATEWAY_ARTIFACT_DIR: /artifacts/browser
    volumes: ["${RUN_DIR:?required}/browser:/artifacts/browser"]
    tmpfs: ["/tmp:rw,nosuid,size=1g", "/home/gateway:rw,nosuid,size=256m"]
    networks: {agent-control: {}, reference-web: {}, candidate-web: {}}

  worker:
    <<: *service-security
    profiles: [build]
    build:
      context: ../..
      dockerfile: websitebench/services/agent/Dockerfile
    depends_on: {browser: {condition: service_started}, builder: {condition: service_healthy}, model: {condition: service_started}}
    environment:
      BROWSER_GATEWAY_URL: http://browser:7000
      BUILDER_URL: http://builder:7100
      GATEWAY_TOKEN: ${GATEWAY_TOKEN:?required}
      BUILDER_TOKEN: ${BUILDER_TOKEN:?required}
      CODEX_API_KEY: ${OPENAI_API_KEY:?required}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      HTTP_PROXY: http://model:7200
      HTTPS_PROXY: http://model:7200
      NO_PROXY: browser,builder,localhost,127.0.0.1
      TASK_PATH: /task/task.json
      AGENT_ARTIFACT_DIR: /artifacts/agent
    volumes:
      - ${RUN_DIR:?required}/candidate:/workspace/candidate
      - ${RUN_DIR:?required}/task.json:/task/task.json:ro
      - ${RUN_DIR:?required}/public:/task/public:ro
      - ${RUN_DIR:?required}/schemas:/task/schemas:ro
      - ${RUN_DIR:?required}/agent:/artifacts/agent
      - ${RUN_DIR:?required}/human-interventions.jsonl:/artifacts/human-interventions.jsonl:ro
    tmpfs: ["/tmp:rw,nosuid,size=512m"]
    networks: {agent-control: {}, model-egress: {}}

  judge:
    <<: *service-security
    profiles: [judge]
    build:
      context: ../..
      dockerfile: websitebench/commerce-runtime/judge/Dockerfile
    command: [python, /opt/evaluator/commerce_judge.py]
    depends_on: {target: {condition: service_healthy}, inbox: {condition: service_started}}
    environment:
      BENCH_ADMIN_TOKEN: ${BENCH_ADMIN_TOKEN:?required}
      REFERENCE_URL: http://target:8080
      REFERENCE_ADMIN_URL: http://target:8081
      CANDIDATE_URL: http://candidate-app:8080
      CANDIDATE_ADMIN_URL: http://candidate-app:8081
      MAILBOX_URL: http://inbox:8025
      MAILBOX_ADMIN_URL: http://inbox:8026
      BENCH_FIXTURE_DIR: /bench-fixtures
      ASSERTIONS_PATH: /task/private/assertions.json
      ARTIFACT_ROOT: /artifacts
    volumes:
      - ${RUN_DIR:?required}/eval:/artifacts/eval
      - ${EVALUATOR_SOURCE_PATH:?required}:/opt/evaluator/commerce_judge.py:ro
      - ${RUN_DIR:?required}/public:/task/public:ro
      - ${RUN_DIR:?required}/schemas:/task/schemas:ro
      - ${PRIVATE_FIXTURE_DIR:?required}:/bench-fixtures:ro
      - ${ASSERTIONS_PATH:?required}:/task/private/assertions.json:ro
    tmpfs: ["/tmp:rw,nosuid,size=1g", "/home/evaluator:rw,nosuid,size=256m"]
    networks: {reference-web: {}, candidate-web: {}}

networks:
  agent-control: {internal: true}
  reference-web: {internal: true}
  candidate-web: {internal: true}
  model-egress: {internal: true}
  build-egress: {}
  internet-egress: {}

volumes:
  reference-data: {}
  mailbox-data: {}
  build-data: {}
