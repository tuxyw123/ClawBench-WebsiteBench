schema_version: websitebench.variant.v1
family_id: white-label-commerce-v1
site_id: northstar-market
variant_id: northstar-standard
site_version: 1.0.0
display_name: Northstar Market
instruction: Reconstruct the observable Northstar commerce experience, including persistent
  accounts, carts, checkout, inventory, orders, controlled time, and documented boundary
  behavior.
golden_source: northstar-market
catalog:
  brand: Northstar Market
  categories:
  - Workspace
  - Outdoors
  - Kitchen
  - Audio
  - Travel
  - Wellness
  - Lighting
  - Storage
  product_nouns:
  - Desk Lamp
  - Trail Pack
  - Mixing Bowl
  - Speaker
  - Carry Case
  - Yoga Mat
  - Lantern
  - Organizer
  base_price_cents: 1299
seeds:
  public: 1101
  hidden: 9101
  concurrency: 9199
policies:
  quantity:
    kind: standard_cap
    parameters:
      maximum: 5
  pricing:
    kind: standard
    parameters:
      tax_basis_points: 825
  inventory:
    kind: checkout_decrement
    parameters:
      atomic: true
  fulfillment:
    kind: shipping
    parameters:
      standard_cents: 799
      free_threshold_cents: 7500
  cancellation:
    kind: window
    parameters:
      minutes: 1440
  token_lifetime:
    kind: fixed
    parameters:
      verification_minutes: 30
      reset_minutes: 60
journeys:
- catalog_observability
- account_lifecycle
- cart_inventory
- checkout_concurrency
- orders_terminal
assertions:
- kind: rule_visible
  journey: catalog_observability
  parameters:
    quantity_cap: 5
- kind: account_token_lifetime
  journey: account_lifecycle
  parameters:
    verification_minutes: 30
    reset_minutes: 60
- kind: quantity_policy
  journey: cart_inventory
  parameters:
    maximum: 5
- kind: atomic_concurrency
  journey: checkout_concurrency
  parameters:
    stock_floor: 0
- kind: cancellation_policy
  journey: orders_terminal
  parameters:
    window_minutes: 1440
