{% extends "base.html" %}
{% block content %}<section class="auth-shell"><div class="auth-card"><p class="eyebrow">Account help</p><h1>Reset your password</h1><p>Enter your email. If an account exists, we'll send a link to the local test mailbox.</p><form method="post" class="stack-form" data-busy-form><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="email" required><button class="button button--wide" type="submit">Send reset link</button></form><p class="auth-switch"><a href="/login">Back to sign in</a></p></div></section>{% endblock %}
