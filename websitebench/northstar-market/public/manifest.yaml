schema_version: websitebench.site.v1
site_id: northstar-market
display_name: Northstar Market
site_version: 1.0.0
family_id: white-label-commerce-v1
split: validation
difficulty: hard
description: >-
  Synthetic white-label commerce site with account verification, persistent
  carts, simulated checkout, transactional inventory, orders, and controlled
  time.

taxonomy:
  product_type: ecommerce-marketplace
  capability_tags:
    - account-lifecycle
    - catalog-search
    - checkout
    - inventory
    - order-management
    - password-reset
    - persistent-cart
  interaction_tags:
    - async-feedback
    - browser-history
    - form-validation
    - keyboard-navigation
    - pagination
    - responsive-navigation
  roles:
    - guest
    - customer
  stateful_entities:
    - user
    - session
    - verification-token
    - password-reset-token
    - cart
    - cart-item
    - product
    - inventory
    - order
    - order-item

public:
  prd: public/PRD.md
  candidate_contract: public/candidate-contract.md
  task_schema: ../schemas/task.schema.json
  fixture_schema: ../schemas/fixture.schema.json
  admin_contract_schema: ../schemas/admin-contract.schema.json
  visual_checkpoints: public/visual-checkpoints.json
  smoke_cases: public/public-smoke-cases.json
  scoring: public/scoring.json
  report_schema: ../schemas/report.schema.json

services:
  public_port: 8080
  admin_port: 8081
  health_path: /healthz
  mailbox_delivery_path: /api/v1/messages
  mailbox_query_path: /api/v1/inbox

routes:
  - /
  - /search
  - /products/{slug}
  - /cart
  - /register
  - /verify
  - /login
  - /forgot-password
  - /reset-password
  - /checkout
  - /checkout/success/{order_number}
  - /account/orders
  - /account/orders/{order_number}

seeds:
  public:
    - id: 1101
      purpose: Agent exploration and deterministic visual comparison
      fixture: public/fixtures/1101.json
    - id: 1102
      purpose: Public smoke tests
      fixture: public/fixtures/1102.json

tracks:
  core:
    enabled: true
    human_messages: 0
    human_minutes: 0
    human_file_edits: false
  hitl:
    enabled: true
    human_messages: 12
    human_minutes: 90
    human_file_edits: false

agent_budget:
  wall_time_seconds: 28800
  token_budget: 2000000
  browser_actions: 1000
  candidate_builds: 20

pilot_agent:
  harness: codex
  model: gpt-5.6-sol
  thinking_level: xhigh

browser_policy:
  engine: browser-use
  version: 0.12.6
  reference_access: continuous
  allowed:
    - navigate to task-provided reference and mailbox URLs
    - inspect rendered accessibility tree and visible text
    - click, type, select, scroll, hover, and use browser history
    - capture viewport screenshots through the gateway
    - use a fresh isolated browser profile for each run
  denied:
    - arbitrary shell HTTP requests to reference or mailbox
    - raw HTML, response body, header, cookie, or storage export
    - source map, JavaScript bundle, stylesheet, or media download
    - DevTools, CDP, browser cache, or browser profile access
    - file upload, page download, print-to-file, or save-page
    - clipboard transfer from browser container to agent workspace

license:
  code: Apache-2.0
  content: CC0-1.0 synthetic catalog and copy
  assets: CC0-1.0 deterministic locally generated SVG artwork
  trademarks: Northstar Market is a synthetic benchmark brand; no third-party commercial marks or assets are used
